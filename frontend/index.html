<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Token DApp</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 500px; margin: auto; border: 1px solid #ccc; padding: 20px; border-radius: 10px; }
        input { width: 100%; margin-bottom: 10px; padding: 8px; }
        button { cursor: pointer; padding: 10px; background: #007bff; color: white; border: none; width: 100%; }
        #status { margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>My Token DApp</h2>
        <button id="connectBtn">Connect Wallet</button>
        <p>Address: <span id="userAddress">Not connected</span></p>
        <p>Balance: <span id="userBalance">0</span> tokens</p>

        <hr>

        <h3>1. Standard Transfer</h3>
        <input type="text" id="recipient" placeholder="Recipient Address (0x...)">
        <input type="number" id="amount" placeholder="Amount">
        <button id="transferBtn">Send Tokens</button>

        <hr>

        <h3>2. Allowances (Part 2)</h3>
        <p>Authorize someone else to spend your tokens.</p>
        <input type="text" id="spender" placeholder="Spender Address (0x...)">
        <input type="number" id="approveAmount" placeholder="Amount to Approve">
        <button id="approveBtn" style="background: #28a745;">Approve Spender</button>
        
        <br><br>
        
        <p>Spend someone else's tokens (requires approval):</p>
        <input type="text" id="fromAddress" placeholder="From (Owner Address)">
        <input type="text" id="toAddress" placeholder="To (Recipient Address)">
        <input type="number" id="transferFromAmount" placeholder="Amount">
        <button id="transferFromBtn" style="background: #28a745;">Transfer From</button>

        <hr>

        <div id="ownerPanel" style="display:none; border: 2px solid red; padding: 10px; border-radius: 5px;">
            <h3>3. Admin Controls (Pausable)</h3>
            <p>Current Status: <span id="pauseStatus">Active</span></p>
            <button id="pauseBtn" style="background: #dc3545;">Pause All Transfers</button>
            <button id="unpauseBtn" style="background: #6c757d; margin-top: 5px;">Unpause Transfers</button>
        </div>

        <div id="status" style="margin-top: 20px; color: blue;"></div>
    </div>

    <script type="module">
        import { ethers } from "0x4856b894fA020Ff6e9Cb5A5b7eBA7D91DC15247E";

        const CONTRACT_ADDRESS = "YOUR_NEW_DEPLOYED_ADDRESS";
        const ABI = [
    {
      "anonymous": false,
      "inputs": [
        {
          "indexed": true,
          "internalType": "address",
          "name": "owner",
          "type": "address"
        },
        {
          "indexed": true,
          "internalType": "address",
          "name": "spender",
          "type": "address"
        },
        {
          "indexed": false,
          "internalType": "uint256",
          "name": "amount",
          "type": "uint256"
        }
      ],
      "name": "Approval",
      "type": "event"
    },
    {
      "anonymous": false,
      "inputs": [
        {
          "indexed": false,
          "internalType": "address",
          "name": "by",
          "type": "address"
        }
      ],
      "name": "Paused",
      "type": "event"
    },
    {
      "anonymous": false,
      "inputs": [
        {
          "indexed": true,
          "internalType": "address",
          "name": "from",
          "type": "address"
        },
        {
          "indexed": true,
          "internalType": "address",
          "name": "to",
          "type": "address"
        },
        {
          "indexed": false,
          "internalType": "uint256",
          "name": "amount",
          "type": "uint256"
        }
      ],
      "name": "Transfer",
      "type": "event"
    },
    {
      "anonymous": false,
      "inputs": [
        {
          "indexed": false,
          "internalType": "address",
          "name": "by",
          "type": "address"
        }
      ],
      "name": "Unpaused",
      "type": "event"
    },
    {
      "inputs": [
        {
          "internalType": "address",
          "name": "owner",
          "type": "address"
        },
        {
          "internalType": "address",
          "name": "spender",
          "type": "address"
        }
      ],
      "name": "allowance",
      "outputs": [
        {
          "internalType": "uint256",
          "name": "",
          "type": "uint256"
        }
      ],
      "stateMutability": "view",
      "type": "function"
    },
    {
      "inputs": [
        {
          "internalType": "address",
          "name": "",
          "type": "address"
        },
        {
          "internalType": "address",
          "name": "",
          "type": "address"
        }
      ],
      "name": "allowances",
      "outputs": [
        {
          "internalType": "uint256",
          "name": "",
          "type": "uint256"
        }
      ],
      "stateMutability": "view",
      "type": "function"
    },
    {
      "inputs": [
        {
          "internalType": "address",
          "name": "spender",
          "type": "address"
        },
        {
          "internalType": "uint256",
          "name": "amount",
          "type": "uint256"
        }
      ],
      "name": "approve",
      "outputs": [],
      "stateMutability": "nonpayable",
      "type": "function"
    },
    {
      "inputs": [
        {
          "internalType": "address",
          "name": "",
          "type": "address"
        }
      ],
      "name": "balances",
      "outputs": [
        {
          "internalType": "uint256",
          "name": "",
          "type": "uint256"
        }
      ],
      "stateMutability": "view",
      "type": "function"
    },
    {
      "inputs": [
        {
          "internalType": "address",
          "name": "user",
          "type": "address"
        }
      ],
      "name": "getBalance",
      "outputs": [
        {
          "internalType": "uint256",
          "name": "",
          "type": "uint256"
        }
      ],
      "stateMutability": "view",
      "type": "function"
    },
    {
      "inputs": [
        {
          "internalType": "address",
          "name": "to",
          "type": "address"
        },
        {
          "internalType": "uint256",
          "name": "amount",
          "type": "uint256"
        }
      ],
      "name": "transfer",
      "outputs": [],
      "stateMutability": "nonpayable",
      "type": "function"
    },
    {
      "inputs": [
        {
          "internalType": "address",
          "name": "from",
          "type": "address"
        },
        {
          "internalType": "address",
          "name": "to",
          "type": "address"
        },
        {
          "internalType": "uint256",
          "name": "amount",
          "type": "uint256"
        }
      ],
      "name": "transferFrom",
      "outputs": [],
      "stateMutability": "nonpayable",
      "type": "function"
    }
  ];

        let provider, signer, contract;

        async function init() {
            if (window.ethereum) {
                provider = new ethers.BrowserProvider(window.ethereum);
                signer = await provider.getSigner();
                contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
                
                const address = await signer.getAddress();
                document.getElementById('userAddress').innerText = address;
                
                // 1. Check if user is Owner to show Admin Panel
                const owner = await contract.owner();
                if (address.toLowerCase() === owner.toLowerCase()) {
                    document.getElementById('ownerPanel').style.display = 'block';
                }

                // 2. Check and display Pause Status
                const isPaused = await contract.paused();
                document.getElementById('pauseStatus').innerText = isPaused ? "PAUSED" : "Active";
                document.getElementById('pauseStatus').style.color = isPaused ? "red" : "green";

                updateBalance(address);
            }
        }

        async function updateBalance(address) {
            const balance = await contract.getBalance(address);
            document.getElementById('userBalance').innerText = ethers.formatEther(balance);
        }

        // --- BUTTON EVENT LISTENERS ---

        document.getElementById('connectBtn').addEventListener('click', init);

        // Standard Transfer
        document.getElementById('transferBtn').addEventListener('click', async () => {
            const to = document.getElementById('recipient').value;
            const amount = ethers.parseEther(document.getElementById('amount').value);
            try {
                const tx = await contract.transfer(to, amount);
                await tx.wait();
                alert("Transfer Successful!");
                updateBalance(await signer.getAddress());
            } catch (err) { alert("Error: " + err.reason); }
        });

        // Approve Spender
        document.getElementById('approveBtn').addEventListener('click', async () => {
            const spender = document.getElementById('spender').value;
            const amount = ethers.parseEther(document.getElementById('approveAmount').value);
            try {
                const tx = await contract.approve(spender, amount);
                await tx.wait();
                alert("Approval successful!");
            } catch (err) { alert("Error: " + err.reason); }
        });

        // Transfer From (Spend someone else's tokens)
        document.getElementById('transferFromBtn').addEventListener('click', async () => {
            const from = document.getElementById('fromAddress').value;
            const to = document.getElementById('toAddress').value;
            const amount = ethers.parseEther(document.getElementById('transferFromAmount').value);
            try {
                const tx = await contract.transferFrom(from, to, amount);
                await tx.wait();
                alert("TransferFrom Successful!");
            } catch (err) { alert("Error: " + err.reason); }
        });

        // Pause/Unpause Logic
        document.getElementById('pauseBtn').addEventListener('click', async () => {
            const tx = await contract.pause();
            await tx.wait();
            location.reload(); // Refresh to update UI status
        });

        document.getElementById('unpauseBtn').addEventListener('click', async () => {
            const tx = await contract.unpause();
            await tx.wait();
            location.reload();
        });
    </script>
</body>
</html>
